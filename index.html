<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0e0f; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 32px 16px 64px; }
    .app { background: #111213; border-radius: 20px; overflow: hidden; width: 100%; max-width: 420px; min-height: 600px; }
    .topbar { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 0.5px solid #242424; }
    .back-btn { background: none; border: none; color: #5b9cf6; font-size: 14px; cursor: pointer; padding: 4px 0; display: none; align-items: center; gap: 4px; }
    .back-btn.visible { display: flex; }
    .topbar-title { font-size: 16px; font-weight: 500; color: #f0f0f0; }
    .topbar-sub { font-size: 12px; color: #555; margin-top: 1px; }
    .legend { display: flex; gap: 12px; padding: 10px 20px; border-bottom: 0.5px solid #1a1a1a; flex-wrap: wrap; }
    .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .list { padding: 8px 0; }
    .row { display: flex; align-items: center; gap: 14px; padding: 13px 20px; cursor: pointer; border-bottom: 0.5px solid #1a1a1a; transition: background 0.1s; }
    .row:hover { background: #191a1b; }
    .row:last-child { border-bottom: none; }
    .av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .row-info { flex: 1; min-width: 0; }
    .row-name { font-size: 15px; color: #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-sub { font-size: 12px; color: #555; margin-top: 2px; }
    .row-amount { font-size: 15px; white-space: nowrap; }
    .chevron { color: #444; font-size: 16px; margin-left: 4px; }
    .state-bar { display: flex; gap: 6px; padding: 12px 20px; border-bottom: 0.5px solid #1a1a1a; overflow-x: auto; scrollbar-width: none; }
    .state-bar::-webkit-scrollbar { display: none; }
    .pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1.5px solid; transition: all 0.12s; outline: none; }
    .pill-all { background: #222; color: #aaa; border-color: #333; }
    .pill-all:hover { background: #2a2a2a; color: #ccc; border-color: #444; }
    .pill-all.active { background: #333; color: #f0f0f0; border-color: #666; }
    .pill-moneyin { background: #0e2018; color: #4caf7d; border-color: #1a3526; }
    .pill-moneyin:hover { background: #132a1e; color: #5ec98a; border-color: #255c3a; }
    .pill-moneyin.active { background: #1a3d28; color: #6ddb99; border-color: #4caf7d; }
    .pill-moneyout { background: #1a1228; color: #9b8ff5; border-color: #2a1e42; }
    .pill-moneyout:hover { background: #221630; color: #ab9ff7; border-color: #3a2a58; }
    .pill-moneyout.active { background: #2a1c3e; color: #bfb0ff; border-color: #9b8ff5; }
    .pill-pending { background: #201c08; color: #c8a84b; border-color: #352e10; }
    .pill-pending:hover { background: #2a2408; color: #d4b455; border-color: #554a18; }
    .pill-pending.active { background: #352c0a; color: #e0c060; border-color: #c8a84b; }
    .pill-declined { background: #200c0c; color: #d95c5c; border-color: #361414; }
    .pill-declined:hover { background: #2a1010; color: #e56868; border-color: #562020; }
    .pill-declined.active { background: #361212; color: #f07070; border-color: #d95c5c; }
    .empty { padding: 40px 20px; text-align: center; color: #444; font-size: 14px; }
    .cat-count { font-size: 11px; color: #555; background: #1c1c1c; padding: 2px 8px; border-radius: 10px; margin-left: auto; }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <button class="back-btn" id="backBtn" onclick="goBack()">&#8592; Back</button>
    <div>
      <div class="topbar-title" id="topTitle">Transactions</div>
      <div class="topbar-sub" id="topSub">Select a category</div>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="dot" style="background:#4caf7d;"></div>Money In</div>
    <div class="leg"><div class="dot" style="background:#9b8ff5;"></div>Money Out</div>
    <div class="leg"><div class="dot" style="background:#c8a84b;"></div>Pending</div>
    <div class="leg"><div class="dot" style="background:#d95c5c;"></div>Declined</div>
  </div>
  <div id="stateBar" class="state-bar" style="display:none;"></div>
  <div class="list" id="mainList"></div>
</div>

function getAmtColor(state, amount) {
  if (state === 'declined') return '#d95c5c';
  if (state === 'none') return '#444';
  if (amount && amount.startsWith('+')) return '#4caf7d';
  return '#f0f0f0';
}

let view='categories', activeCat=null, activeState=null, activeTxIdx=null;

function render() {
  const list  = document.getElementById('mainList');
  const title = document.getElementById('topTitle');
  const sub   = document.getElementById('topSub');
  const back  = document.getElementById('backBtn');
  const bar   = document.getElementById('stateBar');

  if (view === 'categories') {
    back.classList.remove('visible');
    title.textContent = 'Transactions';
    sub.textContent   = 'Select a category';
    bar.style.display = 'none';
    list.innerHTML = data.categories.map(cat => {
      const txs = data.transactions[cat.id] || [];
      return `<div class="row" onclick="selectCat('${cat.id}')">
        <div class="av" style="background:${cat.color};">
          <span style="font-size:20px;color:${cat.iconColor};">${cat.icon}</span>
        </div>
        <div class="row-info">
          <div class="row-name">${cat.name}</div>
          <div class="row-sub">${txs.length} transaction type${txs.length!==1?'s':''}</div>
        </div>
        <span class="cat-count">${txs.length}</span>
        <span class="chevron">›</span>
      </div>`;
    }).join('');

  } else if (view === 'transactions') {
    const cat = data.categories.find(c => c.id === activeCat);
    const txs = data.transactions[activeCat] || [];
    back.classList.add('visible');
    title.textContent = cat.name;
    sub.textContent   = `${txs.length} transaction type${txs.length!==1?'s':''}`;

    const allStates = [...new Set(txs.flatMap(t => t.states.map(s => s.s)).filter(s => s !== 'none'))];
    bar.style.display = 'flex';
    const pills = [{ key:'all', label:'All', cls:'pill-all' }, ...allStates.map(s => ({ key:s, label:stateLabel[s], cls:`pill-${s}` }))];
    bar.innerHTML = pills.map(p => {
      const isActive = (p.key==='all' && activeState===null) || (p.key===activeState);
      return `<button class="pill ${p.cls}${isActive?' active':''}" onclick="selectState('${p.key}')">${p.label}</button>`;
    }).join('');

    const filtered = activeState ? txs.filter(t => t.states.some(s => s.s === activeState)) : txs;
    list.innerHTML = filtered.length ? filtered.map(tx => {
      const displayStates = activeState ? tx.states.filter(s => s.s === activeState) : tx.states;
      const primary       = displayStates[0];
      const uniqueTypes   = [...new Set(displayStates.map(s => s.s))];
      const idx           = data.transactions[activeCat].indexOf(tx);
      return `<div class="row" onclick="selectTxDetail('${activeCat}',${idx})">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:10px;">
          ${uniqueTypes.map(st => `<div class="dot" style="background:${dotColor[st]};"></div>`).join('')}
        </div>
        <div class="row-info">
          <div class="row-name">${tx.name}</div>
          <div class="row-sub">${tx.sub} · ${displayStates.map(st => st.label).join(', ')}</div>
        </div>
        <div class="row-amount" style="color:${getAmtColor(primary.s, primary.amount)};">${primary.amount}</div>
        <span class="chevron">›</span>
      </div>`;
    }).join('') : '<div class="empty">No transactions in this state</div>';

  } else if (view === 'detail') {
    const tx = data.transactions[activeCat][activeTxIdx];
    back.classList.add('visible');
    title.textContent = tx.name;
    sub.textContent   = tx.sub;
    bar.style.display = 'none';
    const dates = ['Jan 3','Feb 14','Mar 22','Apr 17','May 8','Jun 30'];
    list.innerHTML = tx.states.map((st, i) => {
      const date = dates[i % dates.length] + ', 2026';
      const subText = st.s === 'pending' ? 'Pending' : `${tx.mockSub} · ${date}`;
      function buildAvatar(tx) {
        const wrap = (inner, badge='') =>
          `<div style="position:relative;flex-shrink:0;width:48px;height:48px;">
            <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;">${inner}</div>
            ${badge ? `<div style="position:absolute;bottom:-1px;right:-1px;width:20px;height:20px;border-radius:50%;border:2px solid #111213;overflow:hidden;display:flex;align-items:center;justify-content:center;">${badge}</div>` : ''}
          </div>`;
        if (tx.icon === 'phantom') return wrap(PHANTOM_SVG);
        if (tx.icon === 'bank')    return wrap(BANK_SVG);
        if (tx.icon === 'perps')   return wrap(PERPS_IMG_SVG, PERPS_BADGE_SVG);
        if (tx.icon === 'swap')    return wrap(SOL_IMG, SWAP_BADGE_SVG);
        if (tx.icon === 'prediction') return wrap(PRED_IMG, PRED_BADGE_SVG);
        if (tx.icon === 'doordash')   return `<div style="position:relative;flex-shrink:0;width:48px;height:48px;">${DOORDASH_SVG}</div>`;
        return wrap(WALLET_SVG);
      }
      const leftEl = buildAvatar(tx);
      const isDeclined = st.s === 'declined';
      const amtStyle = isDeclined
        ? 'color:#606060;text-decoration:line-through;font-size:15px;'
        : `color:${getAmtColor(st.s, st.amount)};font-size:15px;`;
      const subHtml = isDeclined
        ? `<span style="color:#d95c5c;">Declined</span> · <span>${dates[i % dates.length]}, 2026</span>`
        : subText;
      return `<div class="row" style="cursor:default;">
        ${leftEl}
        <div class="row-info">
          <div class="row-name" style="font-size:15px;">${tx.mockTitle}</div>
          <div class="row-sub">${subHtml}</div>
        </div>
        <div class="row-amount" style="${amtStyle}">${st.amount}</div>
      </div>`;
    }).join('');
  }
}

function selectCat(id)           { activeCat=id; activeState=null; view='transactions'; render(); }
function selectState(s)          { activeState=s==='all'?null:s; render(); }
function selectTxDetail(cId,idx) { activeCat=cId; activeTxIdx=idx; view='detail'; render(); }
function goBack() {
  if (view==='detail') { view='transactions'; activeTxIdx=null; }
  else                 { view='categories';   activeCat=null; activeState=null; }
  render();
}

render();
</script>
